name: DaedalusScan
options:
  bundleIdPrefix: com.martinbibb.daedalus
settings:
  base:
    SWIFT_VERSION: 5.10
packages:
  DaedalusContracts:
    path: ./DaedalusContracts
targets:
  DaedalusScanCore:
    type: library.static
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: DaedalusScan
        excludes:
          - App
    dependencies:
      - package: DaedalusContracts
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SUPPORTS_MACCATALYST: NO
  DaedalusScanApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: DaedalusScan/App
    dependencies:
      - target: DaedalusScanCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.martinbibb.daedalus.scan
        PRODUCT_NAME: Daedalus Scan
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Daedalus Scan
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_LSRequiresIPhoneOS: YES
        INFOPLIST_KEY_NSCameraUsageDescription: Daedalus Scan captures room evidence photos.
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: Daedalus Scan stores captured visit evidence.
        INFOPLIST_KEY_NSMicrophoneUsageDescription: Daedalus Scan records voice note evidence.
        SUPPORTS_MACCATALYST: NO
        TARGETED_DEVICE_FAMILY: 1
schemes:
  DaedalusScanApp:
    build:
      targets:
        DaedalusScanCore: all
        DaedalusScanApp: all
    run:
      config: Debug
