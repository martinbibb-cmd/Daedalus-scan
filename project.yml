name: DaedalusScan
options:
  bundleIdPrefix: com.martinbibb.daedalus
settings:
  base:
    SWIFT_VERSION: 5.10
targets:
  DaedalusScanCore:
    type: framework
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: DaedalusScan
        excludes:
          - App
      - path: DaedalusContracts/Sources/DaedalusContracts
    settings:
      base:
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        GENERATE_INFOPLIST_FILE: YES
        SUPPORTS_MACCATALYST: NO
  DaedalusScanApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: DaedalusScan/App
    dependencies:
      - target: DaedalusScanCore
    info:
      path: DaedalusScan/App/Info.plist
      properties:
        CFBundleDisplayName: Daedalus Scan
        LSRequiresIPhoneOS: true
        NSCameraUsageDescription: Daedalus Scan captures room evidence photos.
        NSPhotoLibraryUsageDescription: Daedalus Scan stores captured visit evidence.
        NSMicrophoneUsageDescription: Daedalus Scan records voice note evidence.
        LSSupportsOpeningDocumentsInPlace: false
        UILaunchScreen: {}
        CFBundleDocumentTypes:
          - CFBundleTypeName: Daedalus Scan Package
            CFBundleTypeRole: Editor
            LSHandlerRank: Owner
            LSItemContentTypes:
              - com.daedalus.scan.package
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: com.daedalus.scan.package
            UTTypeDescription: Daedalus Scan Package
            UTTypeConformsTo:
              - public.json
            UTTypeTagSpecification:
              public.filename-extension:
                - daedalusscan
              public.mime-type:
                - application/json
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.martinbibb.daedalus.scan
        PRODUCT_NAME: Daedalus Scan
        SUPPORTS_MACCATALYST: NO
        TARGETED_DEVICE_FAMILY: 1
schemes:
  DaedalusScanApp:
    build:
      targets:
        DaedalusScanCore: all
        DaedalusScanApp: all
    run:
      config: Debug
