name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build contracts package
        working-directory: DaedalusContracts
        run: swift build

      - name: Test contracts package
        working-directory: DaedalusContracts
        run: swift test
